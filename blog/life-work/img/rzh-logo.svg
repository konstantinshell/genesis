<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 220" fill="none">
  <!-- ═══ ЗНАЧОК (мандала + лепестки) ═══ -->
  <g transform="translate(110 110)">
    <!-- Фоновая мандала -->
    <g stroke="currentColor" stroke-width="0.8" opacity="0.55">
      <circle r="98"/>
      <!-- 8 диаметров через каждые 22.5° для эффекта metatron -->
      <line x1="-98" y1="0" x2="98" y2="0"/>
      <line x1="0" y1="-98" x2="0" y2="98"/>
      <line x1="-69.3" y1="-69.3" x2="69.3" y2="69.3"/>
      <line x1="69.3" y1="-69.3" x2="-69.3" y2="69.3"/>
      <line x1="-90.5" y1="-37.5" x2="90.5" y2="37.5"/>
      <line x1="90.5" y1="-37.5" x2="-90.5" y2="37.5"/>
      <line x1="-37.5" y1="-90.5" x2="37.5" y2="90.5"/>
      <line x1="37.5" y1="-90.5" x2="-37.5" y2="90.5"/>
      <!-- Вписанный гексагон -->
      <polygon points="0,-98 84.87,-49 84.87,49 0,98 -84.87,49 -84.87,-49"/>
    </g>

    <!-- 6 лепестков, поочередно teal / orange -->
    <g fill="none" stroke-width="7" stroke-linejoin="round" stroke-linecap="round">
      <g stroke="#1BB5C9">
        <path d="M 0,0 Q 22,-36 0,-76 Q -22,-36 0,0 Z"/>
        <path transform="rotate(120)" d="M 0,0 Q 22,-36 0,-76 Q -22,-36 0,0 Z"/>
        <path transform="rotate(240)" d="M 0,0 Q 22,-36 0,-76 Q -22,-36 0,0 Z"/>
      </g>
      <g stroke="#F7931E">
        <path transform="rotate(60)"  d="M 0,0 Q 22,-36 0,-76 Q -22,-36 0,0 Z"/>
        <path transform="rotate(180)" d="M 0,0 Q 22,-36 0,-76 Q -22,-36 0,0 Z"/>
        <path transform="rotate(300)" d="M 0,0 Q 22,-36 0,-76 Q -22,-36 0,0 Z"/>
      </g>
    </g>
  </g>

  <!-- ═══ ТЕКСТ: РИТМЫ ЖИЗНИ / ЦЕНТР РАЗВИТИЯ ═══ -->
  <g font-family="Oswald, 'Helvetica Neue', sans-serif" fill="currentColor">
    <text x="245" y="88"  font-size="56" font-weight="400" letter-spacing="3">РИТМЫ</text>
    <text x="245" y="146" font-size="56" font-weight="400" letter-spacing="3">ЖИЗНИ</text>
    <text x="245" y="185" font-size="17" font-weight="500" letter-spacing="5.5" fill="#1BB5C9">ЦЕНТР РАЗВИТИЯ</text>
  </g>
</svg>
