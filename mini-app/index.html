<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHYTHMS NOTHING — Мой профиль</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: "Jost", sans-serif;
      background: #ECEEF2;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <p>Загрузка профиля...</p>
  <script>
    let userId;

    // Получаем user_id из Telegram WebApp
    if (window.Telegram && window.Telegram.WebApp) {
      const WebApp = window.Telegram.WebApp;
      WebApp.ready();
      try {
        const data = new URLSearchParams(WebApp.initData);
        const userStr = data.get('user');
        if (userStr) {
          userId = JSON.parse(userStr).id;
        }
      } catch(e) {}
    }

    // Fallback — из URL параметра
    if (!userId) {
      const params = new URLSearchParams(window.location.search);
      userId = params.get('user_id');
    }

    // Редирект на персональную страницу
    if (userId) {
      window.location.replace('../profiles/' + userId + '/');
    } else {
      document.body.innerHTML = '<p>Не удалось определить профиль. Откройте через бот.</p>';
    }
  </script>
</body>
</html>
