<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Команда — ONTO NOTHING</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--tg-theme-bg-color, #0a0a10);
  color: var(--tg-theme-text-color, #e0e0e8);
  min-height: 100vh;
  padding-top: env(safe-area-inset-top, 0px);
  padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 40px);
  max-width: 480px;
  margin: 0 auto;
}
.container { padding: 16px; }

/* Back link (browser only) */
.back-link { display:inline-flex; align-items:center; gap:6px; color:#7c6fff; text-decoration:none; font-size:13px; padding:8px 0; margin-bottom:8px; }
.tg-webapp .back-link { display:none; }

/* Cards */
.c { background:#1a1a22; border-radius:14px; padding:18px; margin-bottom:14px; }
.c h2 { font-family:'Oswald',sans-serif; font-size:16px; font-weight:600; margin-bottom:12px; display:flex; align-items:center; gap:8px; }

/* Section label */
.s-label { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:#7c6fff; margin-bottom:10px; font-weight:600; }

/* Stats grid */
.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:10px; }
.stat-box { background:#12121a; border-radius:10px; padding:12px 8px; text-align:center; }
.stat-box .sv { font-family:'Courier Prime',monospace; font-size:20px; font-weight:700; color:#7c6fff; }
.stat-box .sl { font-size:9px; color:#666; margin-top:3px; }

/* Chart */
.chart-7d { display:flex; align-items:flex-end; gap:6px; height:120px; padding:10px 0; }
.chart-col { flex:1; display:flex; flex-direction:column; align-items:center; height:100%; justify-content:flex-end; }
.chart-col .bar { border-radius:3px 3px 0 0; width:100%; min-height:2px; }
.chart-col .bar.users { background:#7c6fff; }
.chart-col .bar.money { background:#34c759; margin-top:2px; border-radius:0 0 3px 3px; }
.chart-col .dlbl { font-size:9px; color:#555; margin-top:4px; }
.chart-legend { display:flex; gap:16px; justify-content:center; margin-top:8px; }
.chart-legend span { display:flex; align-items:center; gap:4px; font-size:10px; color:#888; }
.chart-legend span::before { content:''; width:8px; height:8px; border-radius:2px; }
.chart-legend .lg-u::before { background:#7c6fff; }
.chart-legend .lg-m::before { background:#34c759; }

/* Member cards */
.member { display:flex; align-items:center; gap:14px; padding:16px; background:#12121a; border-radius:12px; margin-bottom:10px; }
.member .m-av { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700; color:#fff; flex-shrink:0; }
.member .m-name { font-size:14px; font-weight:600; color:#e0e0e8; }
.member .m-role { font-size:11px; color:#888; margin-top:2px; }
.member .m-nums { display:flex; gap:12px; margin-top:6px; }
.member .m-nums span { font-size:11px; color:#aaa; }
.member .m-nums strong { color:#e0e0e8; font-family:'Courier Prime',monospace; }

/* Goals */
.goal { margin-bottom:14px; }
.goal-text { font-size:13px; color:#e0e0e8; line-height:1.5; display:flex; align-items:center; gap:6px; }
.goal-bar { background:#2a2a35; border-radius:3px; height:6px; overflow:hidden; margin-top:6px; }
.goal-fill { height:6px; border-radius:3px; }
.goal-pct { font-size:11px; color:#888; margin-top:4px; }

/* Tasks */
.task-row { display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-bottom:1px solid #1e1e2a; }
.task-row .t-dot { width:8px; height:8px; border-radius:50%; margin-top:5px; flex-shrink:0; }
.task-row .t-body { flex:1; }
.task-row .t-text { font-size:13px; color:#e0e0e8; line-height:1.5; }
.task-row .t-tags { display:flex; gap:4px; flex-wrap:wrap; margin-top:4px; }
.t-tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:10px; font-weight:500; }
.dl-btn { display:flex; align-items:center; justify-content:center; gap:6px; background:#7c6fff; color:#fff; padding:10px 16px; border-radius:8px; font-size:12px; font-weight:500; border:none; cursor:pointer; width:100%; margin-top:12px; -webkit-tap-highlight-color:transparent; }

.updated { text-align:center; padding:16px; color:#333; font-size:11px; }

@media (max-width:360px) {
  .stats-grid { grid-template-columns:1fr 1fr; }
}
</style>
</head>
<body>

<div class="container">
  <a class="back-link" href="javascript:history.back()">← Назад</a>
  <div id="dashboard"><div style="text-align:center;padding:60px 0;color:#555;">Загрузка...</div></div>
</div>

<script>
// Telegram
var tg = window.Telegram && Telegram.WebApp;
if (tg) {
  tg.ready(); tg.expand();
  document.body.classList.add('tg-webapp');
  tg.BackButton.show();
  tg.BackButton.onClick(function() { history.back(); });
}

var SPHERE = {
  'продукт':      { bg:'#1a1a2e', text:'#9d97ff' },
  'партнёрства':  { bg:'#2a2018', text:'#daa040' },
  'операции':     { bg:'#182a24', text:'#3fc090' },
  'маркетинг':    { bg:'#2a1a18', text:'#e07850' },
  'исследования': { bg:'#1a2030', text:'#6eaaee' },
  'юридическое':  { bg:'#2a2028', text:'#c090c0' },
  'финансы':      { bg:'#2a2a18', text:'#cca040' }
};
var ACLR = { '41537154':'#7c6fff', '8211648754':'#f5a623' };

function countNet(node) {
  var r = { real:0, paid:0, totalPaid:0 };
  function walk(n) {
    if (n.real) r.real++;
    if (n.band_paid > 0) { r.paid++; r.totalPaid += n.band_paid; }
    if (n.children) n.children.forEach(walk);
  }
  if (node.children) node.children.forEach(walk);
  if (node.pre_participants) node.pre_participants.forEach(function(p) {
    if (p.band_paid > 0) { r.paid++; r.totalPaid += p.band_paid; }
  });
  return r;
}

function openBot(start) {
  var url = 'https://t.me/ritmnothingbot?start=' + start;
  if (tg) { tg.openTelegramLink(url); return false; }
  window.open(url, '_blank'); return false;
}

Promise.all([
  fetch('analysis.json?t=' + Date.now()).then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; }),
  fetch('../../partners/tasks.json?t=' + Date.now()).then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; }),
  fetch('../../network/data.json?t=' + Date.now()).then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; })
]).then(function(res) {
  render(res[0], res[1], res[2]);
}).catch(function() {
  document.getElementById('dashboard').innerHTML = '<div class="c" style="text-align:center;padding:30px;color:#555;">Ошибка загрузки</div>';
});

function render(a, pt, net) {
  var members = a && a.members ? a.members : {};
  var tasks = pt && pt.tasks ? pt.tasks : [];
  var ns = net ? countNet(net) : { real:0, paid:0, totalPaid:0 };

  var totalTasks = 0, totalIdeas = 0, totalRefl = 0;
  Object.keys(members).forEach(function(k) {
    totalTasks += members[k].tasks || 0;
    totalIdeas += members[k].ideas || 0;
    totalRefl += members[k].reflections || 0;
  });
  totalTasks += tasks.length;

  var ratio = totalIdeas > 0 ? Math.round((totalTasks / totalIdeas) * 100) : 0;
  if (ratio > 100) ratio = 100;

  var h = '';

  // ═══ BLOCK 1: РИТМЫ ПРОЕКТА ═══
  h += '<div class="c">';
  h += '<div class="s-label">РИТМЫ ПРОЕКТА</div>';
  h += '<div class="stats-grid">';
  h += '<div class="stat-box"><div class="sv">' + totalTasks + '</div><div class="sl">Задачи</div></div>';
  h += '<div class="stat-box"><div class="sv">' + totalIdeas + '</div><div class="sl">Идеи</div></div>';
  h += '<div class="stat-box"><div class="sv">' + totalRefl + '</div><div class="sl">Рефлексии</div></div>';
  h += '</div>';
  h += '<div class="stats-grid">';
  h += '<div class="stat-box"><div class="sv" style="color:#34c759;">' + ratio + '%</div><div class="sl">Реализация</div></div>';
  h += '<div class="stat-box"><div class="sv" style="color:#ff9f0a;">' + ns.paid + '</div><div class="sl">Продажи</div></div>';
  h += '<div class="stat-box"><div class="sv">' + (net ? net.total_real || ns.real : 0) + '</div><div class="sl">В боте</div></div>';
  h += '</div>';
  h += '<div class="stat-box" style="margin-top:2px;">';
  h += '<div class="sl" style="margin-bottom:2px;">Активность за 24ч</div>';
  h += '<div class="sv">—</div>';
  h += '<div style="font-size:9px;color:#444;">данные формируются</div>';
  h += '</div>';
  h += '</div>';

  // ═══ BLOCK 2: ГРАФИК 7 ДНЕЙ ═══
  h += '<div class="c">';
  h += '<div class="s-label">ДИНАМИКА · 7 ДНЕЙ</div>';
  var days = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  var daily = a && a.daily_stats;
  if (daily && daily.length) {
    var maxU = 1, maxM = 1;
    daily.forEach(function(d) { if (d.users > maxU) maxU = d.users; if (d.money > maxM) maxM = d.money; });
    h += '<div class="chart-7d">';
    daily.forEach(function(d, i) {
      var hU = Math.round((d.users / maxU) * 80);
      var hM = Math.round((d.money / maxM) * 80);
      h += '<div class="chart-col"><div class="bar users" style="height:' + hU + 'px;"></div><div class="bar money" style="height:' + hM + 'px;"></div><div class="dlbl">' + (days[i] || '') + '</div></div>';
    });
    h += '</div>';
    h += '<div class="chart-legend"><span class="lg-u">Вошли в бота</span><span class="lg-m">Деньги</span></div>';
  } else {
    h += '<div style="height:120px;display:flex;align-items:center;justify-content:center;background:#12121a;border-radius:10px;">';
    h += '<div style="text-align:center;"><div style="font-size:24px;margin-bottom:6px;">📊</div><div style="font-size:12px;color:#555;">Данные по дням формируются</div></div>';
    h += '</div>';
  }
  h += '</div>';

  // ═══ BLOCK 3: MNPI КОМАНДЫ ═══
  h += '<div class="c">';
  h += '<div class="s-label">MNPI КОМАНДЫ</div>';
  Object.keys(members).forEach(function(id) {
    var m = members[id];
    var clr = ACLR[id] || '#7c6fff';
    h += '<div class="member">';
    h += '<div class="m-av" style="background:' + clr + ';">' + (m.name ? m.name.charAt(0) : '?') + '</div>';
    h += '<div style="flex:1;">';
    h += '<div class="m-name">' + (m.name || '—') + '</div>';
    h += '<div class="m-role">' + (m.role || '—') + '</div>';
    h += '<div class="m-nums">';
    h += '<span>💡 <strong>' + (m.ideas || 0) + '</strong></span>';
    h += '<span>📋 <strong>' + (m.tasks || 0) + '</strong></span>';
    h += '<span>🧘 <strong>' + (m.reflections || 0) + '</strong></span>';
    h += '</div></div></div>';
  });
  h += '</div>';

  // ═══ BLOCK 4: ЗАДАЧИ НА ГОД ═══
  h += '<div class="c">';
  h += '<div class="s-label">ЗАДАЧИ НА ГОД</div>';
  if (a && a.goals && a.goals.length) {
    a.goals.forEach(function(g) {
      h += '<div class="goal">';
      h += '<div class="goal-text"><span style="font-size:14px;">' + (g.icon || '🎯') + '</span> ' + g.text + '</div>';
      h += '<div class="goal-bar"><div class="goal-fill" style="width:' + (g.progress || 0) + '%;background:' + (g.color || '#7c6fff') + ';"></div></div>';
      h += '<div class="goal-pct">' + (g.progress || 0) + '% · ' + (g.author || '') + '</div>';
      h += '</div>';
    });
  } else {
    h += '<div style="padding:20px;text-align:center;background:#12121a;border-radius:10px;">';
    h += '<div style="font-size:24px;margin-bottom:6px;">🎯</div>';
    h += '<div style="font-size:12px;color:#555;">Годовые цели формируются</div></div>';
  }
  h += '</div>';

  // ═══ BLOCK 5: ЗАДАЧИ НА НЕДЕЛЮ ═══
  var now = new Date();
  var weekAgo = new Date(now.getTime() - 7*24*60*60*1000);
  var weekTasks = tasks.filter(function(t) {
    return t.status === 'active' && (t.priority === 'hot' || new Date(t.created) >= weekAgo);
  });

  h += '<div class="c">';
  h += '<div class="s-label">ЗАДАЧИ НА НЕДЕЛЮ</div>';
  if (weekTasks.length) {
    weekTasks.forEach(function(t) { h += renderTask(t); });
  } else {
    h += '<div style="padding:16px;text-align:center;color:#555;font-size:12px;">Нет задач на эту неделю</div>';
  }
  h += '</div>';

  // ═══ BLOCK 6: ЗАДАЧИ НА МЕСЯЦ ═══
  var monthTasks = tasks.slice(0, 20);
  h += '<div class="c">';
  h += '<div class="s-label">ЗАДАЧИ НА МЕСЯЦ</div>';
  if (monthTasks.length) {
    monthTasks.forEach(function(t) { h += renderTask(t); });
    h += '<button class="dl-btn" onclick="downloadTasks()">📥 Скачать все задачи</button>';
  } else {
    h += '<div style="padding:16px;text-align:center;color:#555;font-size:12px;">Нет задач</div>';
  }
  h += '</div>';

  h += '<div class="updated">Обновлено: ' + (a && a.updated ? a.updated : '—') + '</div>';
  document.getElementById('dashboard').innerHTML = h;
}

function renderTask(t) {
  var clr = ACLR[t.author_id] || '#888';
  var name = t.author ? t.author.split(' ')[0] : '—';
  var sp = SPHERE[t.sphere] || { bg:'#1a1a2e', text:'#888' };
  var h = '<div class="task-row">';
  h += '<div class="t-dot" style="background:' + clr + ';"></div>';
  h += '<div class="t-body"><div class="t-text">' + t.text + '</div>';
  h += '<div class="t-tags">';
  h += '<span class="t-tag" style="background:' + clr + '22;color:' + clr + ';">' + name + '</span>';
  h += '<span class="t-tag" style="background:' + sp.bg + ';color:' + sp.text + ';">' + (t.sphere || '') + '</span>';
  if (t.priority === 'hot') h += '<span class="t-tag" style="background:#2a1818;color:#ff453a;">🔥 hot</span>';
  h += '</div></div></div>';
  return h;
}

function downloadTasks() {
  fetch('../../partners/tasks.json?t=' + Date.now()).then(function(r){ return r.json(); }).then(function(d) {
    var lines = ['Задача\tАвтор\tСфера\tПриоритет\tСтатус\tДата'];
    (d.tasks || []).forEach(function(t) {
      lines.push([t.text, t.author, t.sphere, t.priority, t.status, t.created].join('\t'));
    });
    var blob = new Blob([lines.join('\n')], { type:'text/tab-separated-values' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'team-tasks-' + new Date().toISOString().slice(0,10) + '.tsv';
    a.click(); URL.revokeObjectURL(url);
  });
}
</script>
</body>
</html>
