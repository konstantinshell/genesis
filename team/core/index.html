(function() {
  var now = new Date();

  // 8 периодов по астрономическим точкам (из планера Натали)
  var periods = [
    { start: [12,22], name: 'Мир смыслов', num: 1, icon: '🌑', world: 'Я есть',
      desc: 'Точка опоры между прошлым и будущим. Время отпустить старое и задать вектор замыслам, которые развернутся в материи. Пространство смыслов и намерений — фундамент всего цикла.' },
    { start: [2,2],   name: 'Мир намерений', num: 2, icon: '🌒', world: 'Я желаю',
      desc: 'Пространство энергии, желаний и целей. Создание образа результата. Время формулировать, чего ты хочешь, и наполнять намерения энергией.' },
    { start: [3,20],  name: 'Мир возможностей', num: 3, icon: '🌓', world: 'Я имею',
      desc: 'Весеннее равноденствие. Пространство действий и проявленности. Время реализовывать намерения — запускать проекты, открывать двери, собирать ресурсы.' },
    { start: [4,30],  name: 'Мир законов', num: 4, icon: '🌔', world: 'Я разрешаю',
      desc: 'Пространство убеждений, границ и правил. Время структурировать процессы, выстроить рамки и дать себе разрешение на масштаб.' },
    { start: [6,22],  name: 'Мир действий', num: 5, icon: '🌕', world: 'Я делаю',
      desc: 'Летнее солнцестояние — пик энергии. Внешний мир, сила и активность. Время максимальной реализации, видимых результатов и проявленности.' },
    { start: [8,1],   name: 'Мир осознаний', num: 6, icon: '🌖', world: 'Я анализирую',
      desc: 'Переход от действия к анализу. Внутренний мир и информация. Время оценить результаты, извлечь уроки и скорректировать курс.' },
    { start: [9,21],  name: 'Мир наблюдений', num: 7, icon: '🌗', world: 'Я наблюдаю',

    { start: [10,31], name: 'Мир познаний', num: 8, icon: '🌘', world: 'Я знаю',

  ];
  var currentIdx = 0;
  for (var i = periods.length - 1; i >= 0; i--) {
    var ps = periods[i].start;
    var pDate = new Date(ps[0] === 12 ? y - 1 : y, ps[0] - 1, ps[1]);
    if (now >= pDate) { currentIdx = i; break; }
  }
  var jan1 = new Date(y, 0, 1);
  var dayOfYear = Math.floor((now - jan1) / 86400000) + 1;
  var weekNum = Math.ceil(dayOfYear / 7);

  var viewIdx = currentIdx;
  window._periods = periods;
  window._currentIdx = currentIdx;
  window._weekNum = weekNum;

  function renderPeriodCard(idx) {
    var p = periods[idx];
    var isCurrent = idx === currentIdx;
    var bar = document.getElementById('period-bar');
    if (!bar) return;

    var monthNames = ['дек','фев','мар','апр','июн','авг','сен','окт'];
    var dateLabel = p.start[1] + '.' + String(p.start[0]).padStart(2,'0');

    var h = '<div style="flex:1;">';
    // Card
    h += '<div style="background:#1a1a2e;border-radius:10px;padding:14px;border:1px solid ' + (isCurrent ? 'rgba(124,111,255,0.25)' : 'rgba(80,80,100,0.15)') + ';">';
    // Header with arrows
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">';
    h += '<div onclick="window._periodNav(-1)" style="padding:4px 10px;cursor:pointer;color:' + (idx > 0 ? '#7c6fff' : '#333') + ';font-size:16px;-webkit-tap-highlight-color:transparent;">‹</div>';
    h += '<div style="text-align:center;">';
    h += '<div style="font-size:9px;color:' + (isCurrent ? '#7c6fff' : '#666') + ';text-transform:uppercase;letter-spacing:1px;">Период ' + p.num + ' из 8</div>';
    if (isCurrent) h += '<div style="font-size:8px;color:#34c759;margin-top:2px;">СЕЙЧАС</div>';
    else {
      var label = idx > currentIdx ? 'ВПЕРЕДИ' : 'ПРОШЁЛ';
      h += '<div style="font-size:8px;color:#555;margin-top:2px;">' + label + '</div>';
    }
    h += '</div>';
    h += '<div onclick="window._periodNav(1)" style="padding:4px 10px;cursor:pointer;color:' + (idx < 7 ? '#7c6fff' : '#333') + ';font-size:16px;-webkit-tap-highlight-color:transparent;">›</div>';
    h += '</div>';
    // Content
    h += '<div style="text-align:center;margin-bottom:8px;">';
    h += '<div style="font-size:28px;margin-bottom:4px;">' + p.icon + '</div>';
    h += '<div style="font-size:16px;font-weight:600;color:#e0e0e8;">' + p.name + '</div>';
    h += '<div style="font-size:12px;color:#888;margin-top:2px;">«' + p.world + '»</div>';
    h += '<div style="font-size:10px;color:#555;margin-top:4px;">с ' + dateLabel + '</div>';
    h += '</div>';
    // Description (hidden, toggle on tap)
    h += '<div onclick="var d=this.querySelector(\'.pd\');d.style.display=d.style.display===\'none\'?\'block\':\'none\';event.stopPropagation();" style="cursor:pointer;margin-top:8px;padding-top:8px;border-top:1px solid #2a2a35;">';
    h += '<div style="font-size:10px;color:#555;text-align:center;">Подробнее ▼</div>';
    h += '<div class="pd" style="display:none;margin-top:8px;font-size:12px;color:#aaa;line-height:1.7;">' + p.desc + '</div>';
    h += '</div>';
    // Dots indicator
    h += '<div style="display:flex;justify-content:center;gap:5px;margin-top:10px;">';
    for (var d = 0; d < 8; d++) {
      var dotClr = d === idx ? '#7c6fff' : (d === currentIdx ? 'rgba(124,111,255,0.4)' : '#2a2a35');
      h += '<div style="width:6px;height:6px;border-radius:50%;background:' + dotClr + ';"></div>';

    // Week box
    h += '<div style="background:#12121a;border-radius:10px;padding:12px;min-width:80px;text-align:center;align-self:flex-start;">';
    h += '<div style="font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Неделя</div>';
    h += '<div style="font-family:Courier Prime,monospace;font-size:24px;font-weight:700;color:#7c6fff;">' + weekNum + '</div>';
    h += '<div style="font-size:9px;color:#555;">из 52</div>';
    h += '</div>';

    bar.innerHTML = h;
  }

  window._periodNav = function(dir) {
    viewIdx = Math.max(0, Math.min(7, viewIdx + dir));
    renderPeriodCard(viewIdx);
  };

  // Swipe support
  var bar = document.getElementById('period-bar');
  var touchX = 0;
  if (bar) {
    bar.addEventListener('touchstart', function(e) { touchX = e.touches[0].clientX; }, {passive:true});

      var dx = e.changedTouches[0].clientX - touchX;
      if (Math.abs(dx) > 40) window._periodNav(dx < 0 ? 1 : -1);
    }, {passive:true});
  }

  renderPeriodCard(currentIdx);
})();

function normalizeModel(raw) {
  var s = raw.toLowerCase();
  if (s.indexOf('garmin') !== -1 || s === 'гармин') return 'Garmin';
  if (s.indexOf('huawei') !== -1) return 'Huawei';
  if (s.indexOf('apple') !== -1) return 'Apple Watch';
  if (s.indexOf('whoop') !== -1) return 'Whoop';
  if (s.indexOf('polar') !== -1) return 'Polar';
  if (s.indexOf('samsung') !== -1) return 'Samsung';
  return raw;
}

function countNet(node) {
  var r = { real:0, paid:0, totalPaid:0, neiry:0, tracker:0, trackerModels:{} };
  function walk(n) {
    if (n.real) r.real++;
    if (n.band_paid > 0) { r.paid++; r.totalPaid += n.band_paid; }
    if (n.band || n.band_type) r.neiry++;
    if (n.tracker || n.tracker_model) {
      r.tracker++;
      var m = normalizeModel(n.tracker_model || 'Другой');
      r.trackerModels[m] = (r.trackerModels[m] || 0) + 1;
    }
    if (n.children) n.children.forEach(walk);
  }
  if (node.children) node.children.forEach(walk);
  if (node.pre_participants) node.pre_participants.forEach(function(p) {
    if (p.band_paid > 0) { r.paid++; r.totalPaid += p.band_paid; }
    if (p.band_type) r.neiry++;
  });
  return r;
}

function build7dayChart(net) {
  var days = [];
  var now = new Date();
  var monthNames = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  for (var i = 6; i >= 0; i--) {
    var d = new Date(now.getTime() - i * 24*60*60*1000);
    var key = d.toISOString().slice(0, 10);
    days.push({ key: key, label: d.getDate() + ' ' + monthNames[d.getMonth()], count: 0, isToday: i === 0 });
  }
  if (!net) return days;
  // Count registered dates from pre_participants
  if (net.pre_participants) {
    net.pre_participants.forEach(function(p) {
      if (!p.registered) return;
      for (var j = 0; j < days.length; j++) {
        if (days[j].key === p.registered) { days[j].count++; break; }
      }
    });
  }
  // Count NDA sign dates from real participants (walk tree)
  function walkDates(node) {
    if (node.nda_date) {
      for (var j = 0; j < days.length; j++) {
        if (days[j].key === node.nda_date) { days[j].count++; break; }
      }
    }
    if (node.children) node.children.forEach(function(ch) { if (ch.real) walkDates(ch); });
  }
  walkDates(net);
  return days;
}

  h += '<div class="stat-box"><div class="sv" style="color:#ff9f0a;">' + ns.paid + '</div><div class="sl">Продажи</div></div>';
  h += '<div class="stat-box"><div class="sv">' + (net ? net.total_real || ns.real : 0) + '</div><div class="sl">В боте</div></div>';
  h += '</div>';
  h += '</div>';

  // ═══ ГАДЖЕТЫ СЕТИ ═══
  h += '<div class="c">';
  h += '<div class="s-label">ГАДЖЕТЫ СЕТИ</div>';
  h += '<div class="stats-grid">';
  h += '<div class="stat-box"><div class="sv" style="color:#e040a0;">' + ns.neiry + '</div><div class="sl">🧠 NEIRY</div></div>';
  h += '<div class="stat-box"><div class="sv" style="color:#0af;">' + ns.tracker + '</div><div class="sl">⌚ Трекеры</div></div>';
  var lqCount = 0;
  Object.keys(members).forEach(function(k) { if (members[k].lq_lab) lqCount++; });
  h += '<div class="stat-box"><div class="sv" style="color:' + (lqCount > 0 ? '#34c759' : '#888') + ';">' + lqCount + '</div><div class="sl">🔬 LQ Lab</div></div>';
  h += '</div>';
  // Breakdown трекеров
  var models = ns.trackerModels || {};
  var modelKeys = Object.keys(models);
  if (modelKeys.length) {
    h += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">';
    modelKeys.forEach(function(m) {
      h += '<span style="font-size:10px;padding:3px 8px;border-radius:4px;background:#12121a;color:#aaa;">⌚ ' + m + ' <strong style="color:#0af;">' + models[m] + '</strong></span>';
    });
    h += '</div>';
  }
  h += '</div>';

  // ═══ БАЛАНС СФЕР ═══
  var sphereCounts = {};
  Object.keys(SPHERE).forEach(function(k) { sphereCounts[k] = 0; });
  tasks.forEach(function(t) {
    var s = t.sphere || '';
    if (SPHERE_ALIAS[s]) s = SPHERE_ALIAS[s];
    if (sphereCounts[s] !== undefined) sphereCounts[s]++;
    else sphereCounts[s] = 1;
  });
  var maxSphere = 1;
  Object.keys(sphereCounts).forEach(function(k) { if (sphereCounts[k] > maxSphere) maxSphere = sphereCounts[k]; });
  var totalSphTasks = tasks.length || 1;

  h += '<div class="c">';
  h += '<div class="s-label">БАЛАНС СФЕР</div>';
  h += '<div style="font-size:11px;color:#666;margin-bottom:14px;">Из потока задач проекта</div>';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
  Object.keys(SPHERE).forEach(function(k) {
    var sp = SPHERE[k];
    var cnt = sphereCounts[k] || 0;
    var pct = Math.round((cnt / totalSphTasks) * 100);
    var barW = cnt > 0 ? Math.max(Math.round((cnt / maxSphere) * 100), 5) : 2;
    h += '<div style="background:#12121a;border-radius:10px;padding:12px;">';
    h += '<div style="font-size:12px;font-weight:600;color:#e0e0e8;margin-bottom:6px;">' + sp.label + '</div>';
    h += '<div style="background:#2a2a35;border-radius:2px;height:4px;margin-bottom:6px;">';
    h += '<div style="height:4px;border-radius:2px;background:' + sp.bar + ';width:' + barW + '%;"></div></div>';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;">';
    h += '<span style="font-size:11px;color:#888;">' + cnt + ' задач</span>';
    h += '<span style="font-size:12px;font-weight:700;color:' + (pct > 50 ? '#34c759' : pct > 0 ? sp.text : '#333') + ';">' + (cnt > 0 ? pct + '%' : '—') + '</span>';
    h += '</div></div>';
  });
  h += '</div>';

  // AI-совет по балансу
  h += '<div id="sphere-advice" style="margin-top:10px;"></div>';
  h += '</div>';
  // Загрузить совет из MD
  setTimeout(function() {
    fetch('sphere-advice.md?t=' + Date.now()).then(function(r){ return r.ok ? r.text() : ''; }).then(function(txt) {
      if (!txt) return;
      var el = document.getElementById('sphere-advice');
      if (el) el.innerHTML = '<div style="background:rgba(124,111,255,0.08);border-left:3px solid #7c6fff;border-radius:0 10px 10px 0;padding:14px;"><div style="font-size:10px;color:#7c6fff;font-weight:600;margin-bottom:6px;">AI-СОВЕТ ПО БАЛАНСУ</div><div style="font-size:12px;color:#ccc;line-height:1.7;">' + txt.replace(/\n/g,'<br>') + '</div></div>';
    }).catch(function(){});
  }, 500);

  // ═══ BLOCK 2: ГРАФИК 7 ДНЕЙ — вступления в бота ═══
  h += '<div class="c">';
  h += '<div class="s-label">ВСТУПЛЕНИЯ В БОТА · 7 ДНЕЙ</div>';
  var chart7 = build7dayChart(net);
  var maxV = 1;
  chart7.forEach(function(d) { if (d.count > maxV) maxV = d.count; });
  var today24 = chart7.length ? chart7[chart7.length - 1].count : 0;
  h += '<div class="chart-7d">';
  chart7.forEach(function(d) {
    var barH = d.count > 0 ? Math.max(Math.round((d.count / maxV) * 90), 6) : 3;
    var barClr = d.isToday ? '#7c6fff' : (d.count > 0 ? '#5a5a9f' : '#2a2a35');
    h += '<div class="chart-col">';
    h += '<div style="font-family:Courier Prime,monospace;font-size:12px;color:' + (d.count > 0 ? '#e0e0e8' : '#333') + ';margin-bottom:4px;font-weight:700;">' + d.count + '</div>';
    h += '<div class="bar" style="height:' + barH + 'px;background:' + barClr + ';border-radius:3px;"></div>';
    h += '<div class="dlbl">' + d.label + '</div>';
    h += '</div>';
  });
  h += '</div>';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">';
  h += '<div style="font-size:10px;color:#888;">Сегодня: <strong style="color:#7c6fff;">' + today24 + '</strong> чел.</div>';
  h += '<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:#555;"><div style="width:8px;height:8px;border-radius:2px;background:#7c6fff;"></div>Сегодня <div style="width:8px;height:8px;border-radius:2px;background:#5a5a9f;margin-left:6px;"></div>Ранее</div>';
  h += '</div>';
  h += '</div>';

  // ═══ BLOCK 3: MNPI КОМАНДЫ ═══
  h += '<div class="c">';
  h += '<div class="s-label">MNPI КОМАНДЫ</div>';
  Object.keys(members).forEach(function(id) {
    var m = members[id];
    var clr = ACLR[id] || '#7c6fff';
    h += '<div class="member">';
    h += '<div class="m-av" style="background:' + clr + ';">' + (m.name ? m.name.charAt(0) : '?') + '</div>';
    h += '<div style="flex:1;">';
    h += '<div class="m-name">' + (m.name || '—') + '</div>';
    h += '<div class="m-role">' + (m.role || '—') + '</div>';
    h += '<div class="m-nums">';
    h += '<span>💡 <strong>' + (m.ideas || 0) + '</strong></span>';
    h += '<span>📋 <strong>' + (m.tasks || 0) + '</strong></span>';
    h += '<span>🧘 <strong>' + (m.reflections || 0) + '</strong></span>';
    h += '</div></div></div>';
  });
  h += '</div>';

  // ═══ BLOCK 4: ЗАДАЧИ НА ГОД ═══
  h += '<div class="c">';
  h += '<div class="s-label">ЗАДАЧИ НА ГОД</div>';
  if (a && a.goals && a.goals.length) {
    a.goals.forEach(function(g) {
      h += '<div class="goal">';
      h += '<div class="goal-text"><span style="font-size:14px;">' + (g.icon || '🎯') + '</span> ' + g.text + '</div>';
      h += '<div class="goal-bar"><div class="goal-fill" style="width:' + (g.progress || 0) + '%;background:' + (g.color || '#7c6fff') + ';"></div></div>';
      h += '<div class="goal-pct">' + (g.progress || 0) + '% · ' + (g.author || '') + '</div>';
      h += '</div>';
    });
  } else {
    h += '<div style="padding:20px;text-align:center;background:#12121a;border-radius:10px;">';
    h += '<div style="font-size:24px;margin-bottom:6px;">🎯</div>';
    h += '<div style="font-size:12px;color:#555;">Годовые цели формируются</div></div>';
  }
  h += '</div>';

  // ═══ BLOCK 5: ЗАДАЧИ НА НЕДЕЛЮ (по дням) ═══
  var now = new Date();
  var dayOfWeek = now.getDay(); // 0=Sun
  var monday = new Date(now);
  monday.setDate(now.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
  monday.setHours(0,0,0,0);
  var sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  sunday.setHours(23,59,59,999);

  var DAY_NAMES = ['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота','Воскресенье'];
  var DAY_SHORT = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  function localDateStr(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  var weekDays = [];
  for (var di = 0; di < 7; di++) {
    var dd = new Date(monday);
    dd.setDate(monday.getDate() + di);
    weekDays.push(localDateStr(dd));
  }

  var weekTasks = tasks.filter(function(t) {
    if (t.status !== 'active') return false;
    if (t.due) {
      var d = new Date(t.due);
      return d >= monday && d <= sunday;
    }
    return t.priority === 'hot';
  });

  var tasksByDay = {};
  weekDays.forEach(function(d) { tasksByDay[d] = []; });
  var noDate = [];
  weekTasks.forEach(function(t) {
    if (t.due && tasksByDay[t.due]) tasksByDay[t.due].push(t);
    else noDate.push(t);
  });

  h += '<div class="c">';
  h += '<div class="s-label">ЗАДАЧИ НА НЕДЕЛЮ</div>';
  var todayStr = localDateStr(now);
  var hasAny = weekTasks.length > 0;

  if (hasAny) {
    weekDays.forEach(function(dayKey, idx) {
      var dayTasks = tasksByDay[dayKey];
      if (!dayTasks.length) return;
      var isToday = dayKey === todayStr;
      var dayNum = dayKey.slice(8,10) + '.' + dayKey.slice(5,7);
      h += '<div style="margin-bottom:12px;">';
      h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">';
      h += '<div style="font-size:12px;font-weight:600;color:' + (isToday ? '#7c6fff' : '#888') + ';">' + DAY_NAMES[idx] + '</div>';
      h += '<div style="font-size:10px;color:#555;">' + dayNum + '</div>';
      if (isToday) h += '<div style="font-size:9px;padding:2px 6px;border-radius:3px;background:rgba(124,111,255,0.15);color:#7c6fff;">сегодня</div>';
      h += '</div>';
      dayTasks.forEach(function(t) { h += renderTask(t); });
      h += '</div>';
    });
    if (noDate.length) {
      h += '<div style="margin-bottom:12px;">';
      h += '<div style="font-size:12px;font-weight:600;color:#f5a623;margin-bottom:6px;">Без даты (hot)</div>';
      noDate.forEach(function(t) { h += renderTask(t); });
      h += '</div>';
    }
  } else {
    h += '<div style="padding:16px;text-align:center;color:#555;font-size:12px;">Нет задач на эту неделю</div>';
  }
  h += '</div>';

  // ═══ BLOCK 6: ЗАДАЧИ НА МЕСЯЦ ═══
  var monthTasks = tasks.slice(0, 20);
  h += '<div class="c">';
  h += '<div class="s-label">ЗАДАЧИ НА МЕСЯЦ</div>';
  if (monthTasks.length) {
    monthTasks.forEach(function(t) { h += renderTask(t); });
    h += '<button class="dl-btn" onclick="downloadTasks()">📥 Скачать все задачи</button>';
  } else {
    h += '<div style="padding:16px;text-align:center;color:#555;font-size:12px;">Нет задач</div>';
  }
  h += '</div>';

  h += '<div class="updated">Обновлено: ' + (a && a.updated ? a.updated : '—') + '</div>';
  document.getElementById('dashboard').innerHTML = h;
}

function renderTask(t) {
  var clr = ACLR[t.author_id] || '#888';
  var name = t.author ? t.author.split(' ')[0] : '—';
  var sKey = SPHERE_ALIAS[t.sphere] || t.sphere;
  var sp = SPHERE[sKey] || { bg:'#1a1a2e', text:'#888', label:t.sphere };
  var h = '<div class="task-row">';
  h += '<div class="t-dot" style="background:' + clr + ';"></div>';
  h += '<div class="t-body"><div class="t-text">' + t.text + '</div>';
  h += '<div class="t-tags">';
  h += '<span class="t-tag" style="background:' + clr + '22;color:' + clr + ';">' + name + '</span>';
  h += '<span class="t-tag" style="background:' + sp.bg + ';color:' + sp.text + ';">' + (sp.label || t.sphere || '') + '</span>';
  if (t.priority === 'hot') h += '<span class="t-tag" style="background:#2a1818;color:#ff453a;">🔥 hot</span>';
  h += '</div></div></div>';
  return h;
}

function downloadTasks() {
  fetch('../../partners/tasks.json?t=' + Date.now()).then(function(r){ return r.json(); }).then(function(d) {
    var lines = ['Задача\tАвтор\tСфера\tПриоритет\tСтатус\tДата'];
    (d.tasks || []).forEach(function(t) {
      lines.push([t.text, t.author, t.sphere, t.priority, t.status, t.created].join('\t'));
    });
    var blob = new Blob([lines.join('\n')], { type:'text/tab-separated-values' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'team-tasks-' + new Date().toISOString().slice(0,10) + '.tsv';
    a.click(); URL.revokeObjectURL(url);
  });
}
</script>
</body>
</html>
