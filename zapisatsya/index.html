<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Запишитесь на программу ONTO NOTHING — исследование нейропластичности и управления состояниями. Индивидуальные сессии, групповые программы, онлайн-курсы.">
  <meta name="keywords" content="запись, регистрация, программа, медитация, практика, ЭЭГ, сессия, курс, коучинг">
  <meta property="og:title" content="Записаться на программу ONTO NOTHING">
  <meta property="og:description" content="Выбери формат и запишись. Индивидуальная сессия, групповая программа, онлайн-курс или консультация.">
  <meta property="og:type" content="website">
  <title>Записаться на программу исследования состояния</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Jost:wght@400;500;600&family=Oswald:wght@500;600;700&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/nav.css">
  <style>
    .form-wrap {
      max-width: 560px;
      margin: 0 auto;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-family: var(--fm);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid rgba(0,0,0,0.1);
      border-radius: 10px;
      background: var(--glass-b);
      font-family: var(--fb);
      font-size: 1rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--acc-soft);
    }
    textarea { resize: vertical; min-height: 120px; }
    .form-submit {
      margin-top: 8px;
      width: 100%;
      padding: 14px;
      font-size: 1rem;
    }
  </style>
</head>
<body>

<div class="page-orbs">
  <span></span>
  <span></span>
</div>

<main>
  <section class="page-hero s">
    <div class="s-inner">
      <span class="tag">запись</span>
      <h1>Записаться</h1>
      <p>Оставьте заявку — мы свяжемся с вами и подберём подходящий формат.</p>
    </div>
  </section>

  <section class="s">
    <div class="s-inner">
      <div class="card form-wrap">
        <form id="signup-form" onsubmit="handleSubmit(event)">
          <div class="form-group">
            <label for="name">Имя</label>
            <input type="text" id="name" name="name" placeholder="Ваше имя" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="email@example.com" required>
          </div>
          <div class="form-group">
            <label for="format">Формат</label>
            <select id="format" name="format">
              <option value="">Выберите формат</option>
              <option value="individual">Индивидуальная сессия</option>
              <option value="group">Групповая программа</option>
              <option value="online">Онлайн-курс</option>
              <option value="consult">Консультация</option>
            </select>
          </div>
          <div class="form-group">
            <label for="message">Комментарий</label>
            <textarea id="message" name="message" placeholder="Расскажите о своём запросе..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary form-submit">Отправить заявку</button>
        </form>
        <div id="form-success" style="display:none; text-align:center; padding:24px 0;">
          <p style="font-family:var(--fh); font-size:1.4rem; font-weight:700; margin-bottom:8px;">Заявка отправлена!</p>
          <p>Мы свяжемся с вами в ближайшее время.</p>
        </div>
      </div>
    </div>
  </section>
</main>

<script>
  function handleSubmit(e) {
    e.preventDefault();
    document.getElementById('signup-form').style.display = 'none';
    document.getElementById('form-success').style.display = 'block';
  }
</script>
<script src="../components/nav.js"></script>
<script src="../components/footer.js"></script>
</body>
</html>
