<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сеть — ONTO NOTHING</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Jost", sans-serif;
      background: #0a0a0f;
      color: #e0e0e8;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      padding: 48px 20px 16px;
    }
    .header h1 {
      font-family: "Oswald", sans-serif;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #fff;
    }
    .header p {
      color: #666;
      font-size: 13px;
      margin-top: 8px;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .stat-num {
      font-family: "Oswald", sans-serif;
      font-size: 32px;
      font-weight: 600;
      color: #7c6fff;
      text-align: center;
    }
    .stat-label {
      font-size: 11px;
      color: #555;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .tree {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    /* Node */
    .n {
      position: relative;
    }
    .n-box {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      margin: 6px 0;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .n-box:hover { background: rgba(124, 111, 255, 0.05); }

    /* Types */
    .n-box.org {
      background: rgba(124, 111, 255, 0.12);
      border: 1px solid rgba(124, 111, 255, 0.3);
      justify-content: center;
      margin-bottom: 16px;
    }
    .n-box.founder {
      background: rgba(124, 111, 255, 0.08);
      border-left: 3px solid #7c6fff;
    }
    .n-box.real {
      background: rgba(255, 255, 255, 0.04);
      border-left: 3px solid #2d9e5a;
    }
    .n-box.demo {
      background: transparent;
      border: 1px dashed rgba(255,255,255,0.08);
      opacity: 0.5;
    }
    .n-box.demo:hover { opacity: 0.8; }

    .n-icon {
      font-size: 20px;
      min-width: 28px;
      text-align: center;
    }
    .n-info { flex: 1; }
    .n-name {
      font-size: 14px;
      font-weight: 500;
      color: #e0e0e8;
    }
    .n-box.demo .n-name { color: #555; }
    .n-role {
      font-size: 11px;
      color: #666;
    }
    .n-lvl {
      font-size: 10px;
      color: #7c6fff;
      background: rgba(124, 111, 255, 0.15);
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
    }

    /* Children connector */
    .n-kids {
      margin-left: 20px;
      padding-left: 20px;
      border-left: 1px solid rgba(124, 111, 255, 0.12);
    }

    .updated {
      text-align: center;
      padding: 30px;
      color: #333;
      font-size: 12px;
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 24px;
      padding: 0 20px 24px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #555;
    }
    .leg-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }
    .leg-dot.r { background: #2d9e5a; }
    .leg-dot.f { background: #7c6fff; }
    .leg-dot.d { border: 1px dashed #555; }

    @media (max-width: 600px) {
      .header h1 { font-size: 22px; }
      .n-kids { margin-left: 12px; padding-left: 14px; }
      .stats { gap: 24px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Сеть ONTO NOTHING</h1>
  <p>Реферальная структура — 5 колен</p>
</div>

<div class="stats">
  <div>
    <div class="stat-num" id="s-real">—</div>
    <div class="stat-label">участников</div>
  </div>
  <div>
    <div class="stat-num">5</div>
    <div class="stat-label">колен</div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="leg-dot f"></div> Основатель</div>
  <div class="legend-item"><div class="leg-dot r"></div> Участник</div>
  <div class="legend-item"><div class="leg-dot d"></div> Свободно</div>
</div>

<div class="tree" id="tree"></div>
<div class="updated" id="upd"></div>

<script>
async function init() {
  try {
    const r = await fetch('data.json?t=' + Date.now());
    const d = await r.json();
    document.getElementById('s-real').textContent = d.total_real;
    document.getElementById('upd').textContent = 'Обновлено: ' + d.updated;
    document.getElementById('tree').innerHTML = render(d, 0);
  } catch(e) {
    document.getElementById('tree').innerHTML = '<p style="text-align:center;color:#444">Загрузка...</p>';
  }
}

function render(node, depth) {
  const isOrg = depth === 0;
  const isFounder = (node.role || '').includes('Основатель') || (node.role || '').includes('основатель');
  const isReal = node.real && !isOrg && !isFounder;
  const isDemo = !node.real;

  let cls = 'n-box';
  let icon = '👤';
  if (isOrg) { cls += ' org'; icon = '🌐'; }
  else if (isFounder) { cls += ' founder'; icon = '👑'; }
  else if (isReal) { cls += ' real'; icon = '✦'; }
  else if (isDemo) { cls += ' demo'; icon = '○'; }

  let lvl = '';
  if (depth >= 2 && !isOrg) {
    lvl = '<span class="n-lvl">L' + (depth - 1) + '</span>';
  }

  let role = node.role || '';
  if (isDemo) role = 'свободное место';

  let name = node.name;
  if (isDemo) name = name.replace(' (свободно)', '');

  let html = '<div class="n"><div class="' + cls + '">';
  html += '<div class="n-icon">' + icon + '</div>';
  html += '<div class="n-info"><div class="n-name">' + name + '</div>';
  if (role) html += '<div class="n-role">' + role + '</div>';
  html += '</div>';
  html += lvl;
  html += '</div>';

  if (node.children && node.children.length) {
    html += '<div class="n-kids">';
    for (const ch of node.children) {
      html += render(ch, depth + 1);
    }
    html += '</div>';
  }

  html += '</div>';
  return html;
}

init();
</script>

</body>
</html>
