<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0">
  <title>Сеть — РИТМЫ NOTHING</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Jost", sans-serif;
      background: #ECEEF2;
      color: #16161A;
      min-height: 100vh;
      overflow-x: auto;
    }

    .header {
      text-align: center;
      padding: 40px 20px 12px;
    }
    .header h1 {
      font-family: "Oswald", sans-serif;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #16161A;
    }
    .header p {
      color: #888;
      font-size: 13px;
      margin-top: 6px;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 36px;
      padding: 16px 20px 20px;
    }
    .stat-num {
      font-family: "Oswald", sans-serif;
      font-size: 30px;
      font-weight: 600;
      color: #5F5FFF;
      text-align: center;
    }
    .stat-label {
      font-size: 10px;
      color: #999;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 0 20px 24px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #888;
    }
    .lg { width: 10px; height: 10px; border-radius: 50%; }
    .lg.f { background: #5F5FFF; }
    .lg.r { background: #34C759; }
    .lg.d { border: 2px dashed #bbb; }

    /* ── FOUNDERS PANEL ── */
    .founders {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      padding: 0 20px 30px;
    }
    .founder-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s;
    }
    .founder-card:hover { transform: scale(1.05); }
    .founder-av {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      background: linear-gradient(135deg, #5F5FFF, #4848D0);
      box-shadow: 0 4px 16px rgba(95, 95, 255, 0.25);
      margin-bottom: 6px;
    }
    .founder-name {
      font-size: 13px;
      font-weight: 500;
      color: #16161A;
    }
    .founder-role {
      font-size: 10px;
      color: #5F5FFF;
      text-transform: uppercase;
    }
    .org-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      background: linear-gradient(135deg, #5F5FFF, #3D3DBF);
      box-shadow: 0 4px 20px rgba(95, 95, 255, 0.35);
      flex-shrink: 0;
    }
    .org-label {
      text-align: center;
      font-family: "Oswald", sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: #888;
      margin-top: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .org-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .founders-line {
      width: 2px;
      height: 30px;
      background: #ccc;
      margin: 0 auto;
    }

    /* ── MLM TREE ── */
    .mlm-wrap {
      display: flex;
      justify-content: center;
      padding: 10px 10px 80px;
      overflow-x: auto;
    }

    .mlm-tree ul {
      display: flex;
      justify-content: center;
      list-style: none;
      padding-top: 24px;
      position: relative;
    }

    .mlm-tree li {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      padding: 0 10px;
    }

    /* Vertical line down from parent */
    .mlm-tree li::before {
      content: '';
      position: absolute;
      top: 0;
      width: 2px;
      height: 24px;
      background: #ccc;
    }

    /* Horizontal line between siblings */
    .mlm-tree li::after {
      content: '';
      position: absolute;
      top: 0;
      height: 2px;
      background: #ccc;
      width: 100%;
      left: 0;
    }

    .mlm-tree li:first-child::after { left: 50%; width: 50%; }
    .mlm-tree li:last-child::after { width: 50%; }
    .mlm-tree li:only-child::after { display: none; }

    /* Root — no lines above */
    .mlm-tree > ul > li::before,
    .mlm-tree > ul > li::after { display: none; }

    /* ── NODE ── */
    .node {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 24px;
    }

    .av {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-bottom: 8px;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .node:hover .av {
      transform: scale(1.12);
    }
    a.node-link {
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    a.node-link:hover .nm {
      color: #5F5FFF;
    }
    a.node-link:hover .av {
      transform: scale(1.15);
      box-shadow: 0 4px 20px rgba(95, 95, 255, 0.4);
    }
    .tg-badge {
      font-size: 9px;
      color: #0A84FF;
      margin-top: 2px;
    }
    .band-badge {
      font-size: 11px;
      margin-top: 1px;
      line-height: 1;
    }

    .av.org {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #5F5FFF, #3D3DBF);
      box-shadow: 0 4px 20px rgba(95, 95, 255, 0.35);
      font-size: 28px;
    }
    .av.founder {
      background: linear-gradient(135deg, #5F5FFF, #4848D0);
      box-shadow: 0 4px 16px rgba(95, 95, 255, 0.25);
    }
    .av.real {
      background: linear-gradient(135deg, #34C759, #28A745);
      box-shadow: 0 4px 12px rgba(52, 199, 89, 0.25);
    }
    .av.demo {
      background: #fff;
      border: 2px dashed #ccc;
    }

    .nm {
      font-size: 13px;
      font-weight: 500;
      color: #16161A;
      text-align: center;
      max-width: 80px;
      line-height: 1.3;
    }
    .demo-node .nm { color: #aaa; }

    .rl {
      font-size: 10px;
      color: #5F5FFF;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }
    .demo-node .rl { color: #bbb; }

    .updated {
      text-align: center;
      padding: 20px;
      color: #bbb;
      font-size: 11px;
    }

    @media (max-width: 700px) {
      .av { width: 42px; height: 42px; font-size: 18px; }
      .av.org { width: 50px; height: 50px; font-size: 24px; }
      .nm { font-size: 11px; max-width: 60px; }
      .mlm-tree li { padding: 0 5px; }
      .mlm-tree ul { padding-top: 18px; }
      .mlm-tree li::before { height: 18px; }
      .node { margin-top: 18px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Сеть РИТМЫ NOTHING</h1>
  <p>MLM-структура — 5 колен</p>
</div>

<div class="stats">
  <div>
    <div class="stat-num" id="s-real">—</div>
    <div class="stat-label">участников</div>
  </div>
  <div>
    <div class="stat-num">5</div>
    <div class="stat-label">колен</div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="lg f"></div> Основатель</div>
  <div class="legend-item"><div class="lg r"></div> Участник</div>
  <div class="legend-item"><div class="lg d"></div> Свободно</div>
  <div class="legend-item">🧠 Нейробенд</div>
  <div class="legend-item">🎁 Промо бенд</div>
  <div class="legend-item">⭐ Промо участник</div>
  <div class="legend-item">⌚ Фитнес-трекер</div>
  <div class="legend-item">⚠️ Без NDA</div>
</div>

<div class="founders">
  <a class="founder-card" href="https://konstantinshell.github.io/genesis/profiles/41537154/" target="_blank">
    <div class="founder-av">👤</div>
    <div class="founder-name">Константин Шель</div>
    <div class="founder-role">основатель</div>
  </a>

  <div class="org-block">
    <div class="org-circle">🌐</div>
    <div class="org-label">Ритмы Nothing</div>
  </div>

  <a class="founder-card" href="https://konstantinshell.github.io/genesis/profiles/8211648754/" target="_blank">
    <div class="founder-av">👤</div>
    <div class="founder-name">Натали Морозова</div>
    <div class="founder-role">основатель</div>
  </a>
</div>

<div class="founders-line"></div>

<div class="mlm-wrap">
  <div class="mlm-tree" id="tree"></div>
</div>

<div class="updated" id="upd"></div>

<script>
async function init() {
  try {
    const r = await fetch('data.json?t=' + Date.now());
    const d = await r.json();
    document.getElementById('s-real').textContent = d.total_real;
    document.getElementById('upd').textContent = 'Обновлено: ' + d.updated;
    document.getElementById('tree').innerHTML = '<ul>' + renderNode(d, 0) + '</ul>';
  } catch(e) {
    document.getElementById('tree').innerHTML = '<p style="color:#aaa;text-align:center">Загрузка...</p>';
  }
}

function renderNode(node, depth) {
  const isOrg = depth === 0;
  const isFounder = (node.role || '').toLowerCase().includes('основатель');
  const isReal = node.real && !isOrg && !isFounder;
  const isDemo = !node.real;

  let avCls = 'av';
  let icon = '👤';
  if (isOrg) { avCls += ' org'; icon = '🌐'; }
  else if (isFounder) { avCls += ' founder'; icon = '👑'; }
  else if (isReal) { avCls += ' real'; icon = '✦'; }
  else { avCls += ' demo'; icon = '?'; }

  let role = '';
  if (isOrg) role = '';
  else if (isFounder) role = 'основатель';
  else if (isDemo) role = 'свободно';

  let hasLink = node.real && !isOrg && (node.profile || node.tg);
  let linkUrl = node.profile || (node.tg ? 'https://t.me/' + node.tg : '');

  let name = node.name;
  if (isDemo) name = name.replace(' (свободно)', '');

  let html = '<li>';
  html += '<div class="node' + (isDemo ? ' demo-node' : '') + '">';

  if (hasLink) {
    html += '<a class="node-link" href="' + linkUrl + '" target="_blank">';
  }

  html += '<div class="' + avCls + '">' + icon + '</div>';
  html += '<div class="nm">' + name + '</div>';
  if (role) html += '<div class="rl">' + role + '</div>';
  if (node.tg && node.real) html += '<div class="tg-badge">@' + node.tg + '</div>';
  if (node.band === 'paid') html += '<div class="band-badge">🧠</div>';
  else if (node.band === 'promo') html += '<div class="band-badge">🎁</div>';
  else if (node.band === 'promo_member') html += '<div class="band-badge">⭐</div>';
  if (node.tracker) html += '<div class="band-badge">⌚</div>';
  if (isReal && node.nda === false) html += '<div class="band-badge" style="color:#ff9f0a;" title="Договор не подписан">⚠️ NDA</div>';

  if (hasLink) {
    html += '</a>';
  }

  html += '</div>';

  if (node.children && node.children.length) {
    html += '<ul>';
    for (const ch of node.children) {
      html += renderNode(ch, depth + 1);
    }
    html += '</ul>';
  }

  html += '</li>';
  return html;
}

init();
</script>

</body>
</html>
