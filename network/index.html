<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0">
  <title>Сеть — ONTO NOTHING</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Jost", sans-serif;
      background: #0a0a0f;
      color: #e0e0e8;
      min-height: 100vh;
      overflow-x: auto;
    }

    .header {
      text-align: center;
      padding: 40px 20px 12px;
    }
    .header h1 {
      font-family: "Oswald", sans-serif;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #fff;
    }
    .header p {
      color: #555;
      font-size: 12px;
      margin-top: 6px;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      padding: 16px 20px 24px;
    }
    .stat-num {
      font-family: "Oswald", sans-serif;
      font-size: 28px;
      font-weight: 600;
      color: #7c6fff;
      text-align: center;
    }
    .stat-label {
      font-size: 10px;
      color: #444;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ── MLM TREE ── */
    .mlm-tree {
      display: flex;
      justify-content: center;
      padding: 20px 10px 80px;
      overflow-x: auto;
    }

    .mlm-tree ul {
      display: flex;
      justify-content: center;
      list-style: none;
      padding-top: 20px;
      position: relative;
    }

    .mlm-tree li {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      padding: 0 8px;
    }

    /* Вертикальная линия вниз от родителя */
    .mlm-tree li::before {
      content: '';
      position: absolute;
      top: 0;
      width: 2px;
      height: 20px;
      background: rgba(124, 111, 255, 0.25);
    }

    /* Горизонтальная линия между братьями */
    .mlm-tree li::after {
      content: '';
      position: absolute;
      top: 0;
      height: 2px;
      background: rgba(124, 111, 255, 0.25);
      width: 100%;
      left: 0;
    }

    .mlm-tree li:first-child::after { left: 50%; width: 50%; }
    .mlm-tree li:last-child::after { width: 50%; }
    .mlm-tree li:only-child::after { display: none; }

    /* Корневой узел — без линий сверху */
    .mlm-tree > ul > li::before,
    .mlm-tree > ul > li::after { display: none; }

    /* ── NODE CARD ── */
    .node {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
      cursor: default;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-bottom: 6px;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .node:hover .avatar {
      transform: scale(1.15);
    }

    .avatar.org {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #7c6fff, #4a3fbf);
      box-shadow: 0 0 30px rgba(124, 111, 255, 0.4);
      font-size: 26px;
    }
    .avatar.founder {
      background: linear-gradient(135deg, #7c6fff, #5a4fd9);
      box-shadow: 0 0 20px rgba(124, 111, 255, 0.3);
    }
    .avatar.real {
      background: linear-gradient(135deg, #2d9e5a, #1e7a42);
      box-shadow: 0 0 15px rgba(45, 158, 90, 0.3);
    }
    .avatar.demo {
      background: transparent;
      border: 2px dashed rgba(255,255,255,0.15);
    }

    .name {
      font-size: 12px;
      font-weight: 500;
      color: #ccc;
      text-align: center;
      max-width: 80px;
      line-height: 1.3;
    }
    .demo .name { color: #444; }

    .role-tag {
      font-size: 9px;
      color: #7c6fff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }
    .demo .role-tag { color: #333; }

    .level-badge {
      font-size: 9px;
      color: #555;
      margin-top: 2px;
    }

    .updated {
      text-align: center;
      padding: 20px;
      color: #2a2a2a;
      font-size: 11px;
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 0 20px 20px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: #444;
    }
    .lg { width: 8px; height: 8px; border-radius: 50%; }
    .lg.f { background: #7c6fff; }
    .lg.r { background: #2d9e5a; }
    .lg.d { border: 1.5px dashed #444; }

    @media (max-width: 600px) {
      .mlm-tree { padding: 10px 0 60px; }
      .avatar { width: 40px; height: 40px; font-size: 18px; }
      .avatar.org { width: 48px; height: 48px; }
      .name { font-size: 10px; max-width: 60px; }
      .mlm-tree li { padding: 0 4px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Сеть ONTO NOTHING</h1>
  <p>MLM-структура — 5 колен</p>
</div>

<div class="stats">
  <div>
    <div class="stat-num" id="s-real">—</div>
    <div class="stat-label">участников</div>
  </div>
  <div>
    <div class="stat-num">5</div>
    <div class="stat-label">колен</div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="lg f"></div> Основатель</div>
  <div class="legend-item"><div class="lg r"></div> Участник</div>
  <div class="legend-item"><div class="lg d"></div> Свободно</div>
</div>

<div class="mlm-tree" id="tree"></div>
<div class="updated" id="upd"></div>

<script>
async function init() {
  try {
    const r = await fetch('data.json?t=' + Date.now());
    const d = await r.json();
    document.getElementById('s-real').textContent = d.total_real;
    document.getElementById('upd').textContent = 'Обновлено: ' + d.updated;
    document.getElementById('tree').innerHTML = '<ul>' + renderNode(d, 0) + '</ul>';
  } catch(e) {
    document.getElementById('tree').innerHTML = '<p style="color:#333;text-align:center">Загрузка...</p>';
  }
}

function renderNode(node, depth) {
  const isOrg = depth === 0;
  const isFounder = (node.role || '').toLowerCase().includes('основатель');
  const isReal = node.real && !isOrg && !isFounder;
  const isDemo = !node.real;

  let avatarCls = 'avatar';
  let icon = '👤';
  if (isOrg) { avatarCls += ' org'; icon = '🌐'; }
  else if (isFounder) { avatarCls += ' founder'; icon = '👑'; }
  else if (isReal) { avatarCls += ' real'; icon = '✦'; }
  else { avatarCls += ' demo'; icon = '?'; }

  let role = '';
  if (isOrg) role = 'организация';
  else if (isFounder) role = node.role;
  else if (isDemo) role = 'свободно';

  let level = '';
  if (depth >= 3) level = '<div class="level-badge">колено ' + (depth - 1) + '</div>';

  let html = '<li>';
  html += '<div class="node' + (isDemo ? ' demo' : '') + '">';
  html += '<div class="' + avatarCls + '">' + icon + '</div>';
  html += '<div class="name">' + node.name + '</div>';
  if (role) html += '<div class="role-tag">' + role + '</div>';
  html += level;
  html += '</div>';

  if (node.children && node.children.length) {
    html += '<ul>';
    for (const ch of node.children) {
      html += renderNode(ch, depth + 1);
    }
    html += '</ul>';
  }

  html += '</li>';
  return html;
}

init();
</script>

</body>
</html>
